<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto.ssr — 入场动画 Demo</title>
<style>
  /* ===== 你网页本身的样式（这里只是放个示例背景，集成时删掉/替换） ===== */
  body { margin:0; font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f4f5f7; color:#1a1a1a; }
  .page { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  .page h1 { font-weight:500; }

  /* ============================================================
     ↓↓↓ 从这里开始是「入场过场动画」需要的代码 ↓↓↓
     ============================================================ */

  /* 全屏遮罩层：盖在网页最上层，播放完后淡出消失 */
  #ssr-intro {
    position: fixed; inset: 0; z-index: 9999;
    background: #0D1016;
    display: flex; align-items: center; justify-content: center;
    opacity: 1;
    transition: opacity .7s ease;
  }
  /* 动画播完后，JS 给它加上 .done，整层淡出 */
  #ssr-intro.done { opacity: 0; pointer-events: none; }

  /* logo 大小：改这里调整入场 logo 的尺寸 */
  #ssr-intro svg { width: min(420px, 78vw); height: auto; }

  /* 各部件初始状态：隐藏 / 线条未描出 */
  #ssr-intro .cring,
  #ssr-intro .spath,
  #ssr-intro .uline { stroke-dasharray:100; stroke-dashoffset:100; opacity:0; }
  #ssr-intro .scap,
  #ssr-intro .word,
  #ssr-intro .glow  { opacity:0; }
  #ssr-intro .cube  { opacity:0; transform:scale(0); transform-box:fill-box; transform-origin:center; }
  #ssr-intro .word  { transform-box:fill-box; transform-origin:center; }

  /* 关键帧 */
  @keyframes ssr-draw { to { stroke-dashoffset:0; } }
  @keyframes ssr-fade { from{opacity:0} to{opacity:1} }
  @keyframes ssr-pop  { from{opacity:0;transform:scale(0)} 60%{opacity:1;transform:scale(1.15)} to{opacity:1;transform:scale(1)} }
  @keyframes ssr-rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  /* 播放序列：调整下面的「延迟秒数」即可改变拼接节奏 */
  #ssr-intro .cring { animation: ssr-fade .25s ease forwards,        ssr-draw 1s ease .1s forwards; }
  #ssr-intro .spath { animation: ssr-fade .25s ease .6s forwards,    ssr-draw .8s ease .65s forwards; }
  #ssr-intro .scap  { animation: ssr-fade .4s  ease 1.35s forwards; }
  #ssr-intro .cube  { animation: ssr-pop  .55s cubic-bezier(.2,.8,.3,1.2) 1.25s forwards; }
  #ssr-intro .glow  { animation: ssr-fade .6s  ease 1.4s forwards; }
  #ssr-intro .word  { animation: ssr-rise .6s  ease 1.7s forwards; }
  #ssr-intro .uline { animation: ssr-fade .2s  ease 1.95s forwards, ssr-draw .7s ease 2s forwards; }

  /* 尊重「减少动态效果」的系统偏好：直接显示完整 logo，不做动画 */
  @media (prefers-reduced-motion: reduce) {
    #ssr-intro .cring,#ssr-intro .spath,#ssr-intro .uline { stroke-dashoffset:0; opacity:1; animation:none; }
    #ssr-intro .scap,#ssr-intro .word,#ssr-intro .glow { opacity:1; animation:none; }
    #ssr-intro .cube { opacity:1; transform:scale(1); animation:none; }
  }
</style>
</head>
<body>

  <!-- ===== 入场动画遮罩层：把这一整块 <div id="ssr-intro"> 放到 <body> 最前面 ===== -->
  <div id="ssr-intro" aria-label="Crypto.ssr 加载中">
    <svg viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img">
      <title>Crypto.ssr</title>
      <defs>
        <linearGradient id="bG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3A8AF0"/><stop offset="1" stop-color="#1450A8"/></linearGradient>
        <linearGradient id="sG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F2F4F7"/><stop offset="0.5" stop-color="#C3C9D2"/><stop offset="1" stop-color="#969DA8"/></linearGradient>
        <radialGradient id="gG" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#E0A21E" stop-opacity="0.45"/><stop offset="1" stop-color="#E0A21E" stop-opacity="0"/></radialGradient>
      </defs>
      <ellipse class="glow" cx="300" cy="252" rx="150" ry="14" fill="url(#gG)"/>
      <path class="cring" pathLength="100" d="M340.15 117.66 A70 70 0 1 0 340.15 232.34" fill="none" stroke="url(#bG)" stroke-width="22" stroke-linecap="round"/>
      <g transform="translate(300,176) scale(1.05)">
        <path class="spath" pathLength="100" d="M13 -16 C11 -23 4 -26 -2 -25 C-11 -24 -15 -18 -14 -11 C-13 -1 13 -3 14 8 C15 19 7 26 -2 26 C-10 26 -15 21 -15 14" fill="none" stroke="url(#sG)" stroke-width="8" stroke-linecap="round"/>
        <circle class="scap" cx="13" cy="-16" r="3" fill="#EDEFF2"/>
        <circle class="scap" cx="-15" cy="14" r="3" fill="#EDEFF2"/>
        <g class="cube">
          <polygon points="0,-9 9,-4.5 0,0 -9,-4.5" fill="#FFD24A"/>
          <polygon points="-9,-4.5 0,0 0,11 -9,6.5" fill="#C8860E"/>
          <polygon points="9,-4.5 0,0 0,11 9,6.5" fill="#E5A81C"/>
        </g>
      </g>
      <text class="word" x="238" y="330" style="font-size:40px;font-weight:500"><tspan fill="#3A8AF0">Crypto</tspan><tspan fill="#C7CDD6">.ssr</tspan></text>
      <line class="uline" pathLength="100" x1="240" y1="345" x2="378" y2="345" stroke="#E0A21E" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- ===== 你的网页正文（示例，集成时换成你自己的内容） ===== -->
  <main class="page">
    <h1>欢迎来到 Crypto.ssr</h1>
    <p>动画播完后，这里就是你的网页内容。</p>
  </main>

  <!-- ===== 控制脚本：放在 </body> 前 ===== -->
  <script>
    (function () {
      var intro = document.getElementById('ssr-intro');
      if (!intro) return;

      // 想「每个浏览器会话只播一次」就解开下面这段注释：
      // if (sessionStorage.getItem('ssrIntroShown')) { intro.remove(); return; }
      // sessionStorage.setItem('ssrIntroShown', '1');

      // 动画总时长约 2.8s，留一点余量后淡出遮罩
      var HOLD = 3000;     // 完整 logo 停留到第几毫秒开始淡出
      setTimeout(function () {
        intro.classList.add('done');
        intro.addEventListener('transitionend', function () { intro.remove(); }, { once: true });
      }, HOLD);
    })();
  </script>

</body>
</html>
